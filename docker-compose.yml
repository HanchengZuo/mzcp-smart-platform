services:
  db:
    container_name: mzcp-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mzcp}
      POSTGRES_USER: ${POSTGRES_USER:-mzcp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mzcp_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mzcp} -d ${POSTGRES_DB:-mzcp}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    container_name: mzcp-backend
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me}
      JWT_SECRET: ${JWT_SECRET:-change-me-too}
      ROOT_USERNAME: ${ROOT_USERNAME:-root}
      ROOT_PASSWORD: ${ROOT_PASSWORD:-root123}
      AUTO_CREATE_DB: "false"
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://mzcp:mzcp_password@db:5432/mzcp}
    ports:
      - "${BACKEND_PORT:-5001}:5001"

  frontend:
    container_name: mzcp-frontend
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5180}:80"

volumes:
  postgres_data:
